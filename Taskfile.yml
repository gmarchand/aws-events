# https://taskfile.dev

version: '3'

dotenv: ['.env']

tasks:
  setup:
    desc: Install all dependencies including dev extras
    cmds:
      - uv sync --extra dev

  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check src/ tests/ scripts/

  format:
    desc: Run ruff formatter
    cmds:
      - uv run ruff format src/ tests/ scripts/

  test:
    desc: Run unit tests (excludes integration tests)
    cmds:
      - uv run pytest tests/ -v --ignore=tests/test_integration.py

  test-all:
    desc: Run all tests including integration
    cmds:
      - uv run pytest tests/ -v

  migrate:
    desc: Run migration script to populate vault from playlists.yaml
    cmds:
      - uv run python scripts/migrate.py --config playlists.yaml --vault-path vault/

  serve:
    desc: Run the MCP server
    cmds:
      - uv run youtube-to-vault
